# ------------------------------------------------------------
# Health IoT 前端 + API 反向代理
# 容器内部监听 80；如需 HTTPS，解开最底部的 443 server 块并挂证书
# ------------------------------------------------------------

# 大文件上传 / 长响应调节（Excel 导出等）
client_max_body_size 50M;

# gzip
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss image/svg+xml;

# Docker 内置 DNS，让 nginx 动态解析容器名
resolver 127.0.0.11 valid=10s ipv6=off;

# 上游后端
upstream backend_upstream {
    server backend:8080;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # index.html 不缓存（部署后用户无需清缓存）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # 静态资源强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 业务接口反代
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Swagger / OpenAPI / Actuator（生产可按需禁用）
    location /swagger-ui/     { proxy_pass http://backend_upstream; proxy_set_header Host $host; }
    location = /swagger-ui.html { proxy_pass http://backend_upstream; proxy_set_header Host $host; }
    location /v3/api-docs     { proxy_pass http://backend_upstream; proxy_set_header Host $host; }
    location /actuator/       { proxy_pass http://backend_upstream; proxy_set_header Host $host; }

    # SPA 路由兜底
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 日志
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}

